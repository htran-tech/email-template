<!--
  Base CSS Content Block for Braze Email Templates
  This block should be referenced at the top of every email template
  Size optimized to stay under 10KB
-->

<style type="text/css">
  /* CSS Reset for Email Clients */
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }

  /* Base Styles */
  body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #000000;
  }

  /* Container */
  .email-container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #000000;
  }

  /* Typography */
  h1, h2, h3, h4, h5, h6 {
    margin: 0;
    padding: 0;
    font-weight: 700;
    line-height: 1.2;
    color: #ffffff;
  }

  h1 { font-size: 32px; }
  h2 { font-size: 28px; }
  h3 { font-size: 24px; }
  h4 { font-size: 20px; }

  p {
    margin: 0;
    padding: 0;
    font-size: 16px;
    line-height: 1.2;
    color: #ffffff;
  }

  a {
    color: #00a8e1;
    text-decoration: none;
  }

  /* CTA Button Base Styles */
  .cta-button {
    display: inline-block;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    border-radius: 4px;
    min-height: 44px;
    line-height: 1.2;
    box-sizing: border-box;
  }

  .cta-primary {
    background-color: #00a8e1;
    color: #000000;
  }

  .cta-secondary {
    background-color: #ffffff;
    color: #000000;
  }

  .cta-dark {
    background-color: #1a1a1a;
    color: #ffffff;
    border: 1px solid #333333;
  }

  .cta-full {
    width: 100%;
    display: block;
  }

  .cta-fixed {
    min-width: 200px;
  }

  /* Poster Grid Styles */
  .poster-grid {
    width: 100%;
  }

  .poster-cell {
    padding: 8px;
  }

  .poster-image {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  .poster-metadata {
    margin-top: 8px;
    font-size: 12px;
    color: #cccccc;
  }

  .poster-title {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 4px;
  }

  /* Hero Styles */
  .hero-container {
    position: relative;
    width: 100%;
    background-size: cover;
    background-position: center;
  }

  .hero-overlay {
    padding: 40px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
  }

  /* Footer Styles */
  .footer-container {
    padding: 32px 20px;
    background-color: #0a0a0a;
  }

  .footer-text {
    font-size: 12px;
    line-height: 1.6;
    color: #999999;
  }

  .footer-link {
    color: #999999;
    text-decoration: underline;
  }

  .social-icons {
    margin: 16px 0;
  }

  .social-icon {
    display: inline-block;
    margin: 0 8px;
  }

  .app-store-buttons {
    margin: 20px 0;
  }

  .app-store-button {
    display: inline-block;
    margin: 0 8px 8px 8px;
  }

  /* Utility Classes */
  .text-center { text-align: center; }
  .text-left { text-align: left; }
  .text-right { text-align: right; }

  .spacer-sm { height: 16px; }
  .spacer-md { height: 24px; }
  .spacer-lg { height: 40px; }

  .padding-sm { padding: 16px; }
  .padding-md { padding: 24px; }
  .padding-lg { padding: 40px; }

  /* Backdrop Blur Effect */
  .backdrop-blur {
    backdrop-filter: blur(35.848px);
    -webkit-backdrop-filter: blur(35.848px);
  }

  /* Hero Status Label */
  .hero-status-label {
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(35.848px);
    -webkit-backdrop-filter: blur(35.848px);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    display: inline-block;
  }

  /* Single Title Hero */
  .st-hero-poster {
    border-radius: 8px;
    display: block;
    margin: 0 auto;
  }

  .hero-tubi-logo {
    display: block;
    margin: 0 auto;
    width: 72px;
    height: auto;
  }

  /* Dual CTA Layout */
  .dual-cta-container {
    width: 100%;
    display: table;
  }

  .dual-cta-cell {
    display: table-cell;
    width: 50%;
    padding: 0 5px;
    vertical-align: top;
  }

  .dual-cta-cell:first-child {
    padding-left: 0;
  }

  .dual-cta-cell:last-child {
    padding-right: 0;
  }

  /* Dark Mode Overrides */
  @media (prefers-color-scheme: dark) {
    .cta-secondary {
      background-color: #e0e0e0;
    }
  }

  /* Mobile Responsive Styles */
  @media only screen and (max-width: 480px) {
    /* Typography adjustments */
    h1 { font-size: 28px !important; }
    h2 { font-size: 24px !important; }
    h3 { font-size: 20px !important; }
    h4 { font-size: 18px !important; }
    p { font-size: 15px !important; line-height: 1.6 !important; }

    /* Container adjustments */
    .email-container {
      width: 100% !important;
      max-width: 100% !important;
    }

    /* Button adjustments */
    .cta-button {
      display: block !important;
      width: 100% !important;
      min-width: auto !important;
      margin: 8px 0 !important;
      box-sizing: border-box !important;
    }

    .cta-fixed {
      min-width: auto !important;
    }

    /* Poster grid - stack to single column */
    .poster-cell {
      display: block !important;
      width: 100% !important;
      padding: 8px 0 !important;
    }

    /* Spacing adjustments */
    .padding-lg { padding: 24px !important; }
    .padding-md { padding: 20px !important; }
    .padding-sm { padding: 16px !important; }

    /* Hero adjustments */
    .hero-overlay {
      padding: 24px 16px !important;
    }

    /* Single Title Hero adjustments */
    .st-hero-poster {
      width: 60% !important;
      max-width: 240px !important;
    }

    /* Footer adjustments */
    .footer-container {
      padding: 24px 16px !important;
    }

    .app-store-button {
      display: block !important;
      margin: 8px 0 !important;
    }
  }

  /* Outlook Specific Fixes */
  <!--[if mso]>
  <style type="text/css">
    table { border-collapse: collapse; }
    .cta-button { padding: 14px 32px !important; }
  </style>
  <![endif]-->
</style>
