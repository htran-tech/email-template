<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tubi Email Template Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #fff; }

    .preview-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; gap: 12px; align-items: center; justify-content: center;
      padding: 16px; background: #111; border-bottom: 1px solid #333;
    }
    .preview-nav button {
      padding: 8px 20px; border: 1px solid #555; border-radius: 6px;
      background: #222; color: #fff; cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    .preview-nav button:hover { background: #333; }
    .preview-nav button.active { background: #ffff13; color: #000; border-color: #ffff13; font-weight: bold; }

    .preview-nav .width-toggle {
      margin-left: 24px; padding: 8px 16px;
      border: 1px solid #555; border-radius: 6px;
      background: #222; color: #aaa; cursor: pointer; font-size: 13px;
    }
    .preview-nav .width-toggle.active { background: #333; color: #fff; border-color: #777; }

    .preview-frame-wrap {
      display: flex; justify-content: center; padding: 32px 16px;
      transition: all 0.3s;
    }
    .preview-frame-wrap iframe {
      border: none; background: #000; transition: width 0.3s;
      max-width: 100%;
    }
    .preview-info {
      text-align: center; padding: 8px; font-size: 12px; color: #666;
    }
  </style>
</head>
<body>

  <div class="preview-nav">
    <button class="active" onclick="loadTemplate('dark', this)">Dark Mode</button>
    <button onclick="loadTemplate('light', this)">Light Mode</button>
    <button class="width-toggle" onclick="toggleWidth(600, this)">600px (Mobile)</button>
    <button class="width-toggle active" onclick="toggleWidth(800, this)">800px (Desktop)</button>
  </div>

  <div class="preview-info" id="info">Viewing: example-dark.html at 800px</div>

  <div class="preview-frame-wrap">
    <iframe id="preview" src="templates/example-dark.html" width="800" height="2000"></iframe>
  </div>

  <script>
    let currentTemplate = 'dark';
    let currentWidth = 800;

    function loadTemplate(mode, btn) {
      currentTemplate = mode;
      document.querySelectorAll('.preview-nav button:not(.width-toggle)').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('preview').src = 'templates/example-' + mode + '.html';
      updateInfo();
    }

    function toggleWidth(w, btn) {
      currentWidth = w;
      document.querySelectorAll('.width-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('preview').width = w;
      updateInfo();
    }

    function updateInfo() {
      document.getElementById('info').textContent =
        'Viewing: example-' + currentTemplate + '.html at ' + currentWidth + 'px';
    }
  </script>

</body>
</html>
